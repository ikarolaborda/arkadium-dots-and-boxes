name: dots-and-boxes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dots_and_boxes
      POSTGRES_USER: dab
      POSTGRES_PASSWORD: dab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dab -d dots_and_boxes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dab:dab@postgres:5432/dots_and_boxes?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FRONTEND_ORIGIN: http://localhost:8080
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    command: >
      sh -c "npx --yes prisma migrate deploy --schema=prisma/schema.prisma &&
             node dist/main/main.js"

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    driver: bridge
